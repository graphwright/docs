site_name: Domain-Agnostic Knowledge Graph Server
site_description: Documentation for the domain-agnostic knowledge graph server
repo_url: https://github.com/wware/kgraph
repo_name: wware/kgraph

site_url: https://graphwright.github.io/docs/
use_directory_urls: true
# Explicit docs dir (Dockerfile copies docs/ and kgserver/index.md into it)
docs_dir: docs

theme:
  name: material

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - pymdownx.arithmatex:
      generic: true
  - tables
  - toc:
      permalink: true

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  # External URLs only: Material nests this as a collapsible section (expand to see links).
  - Live tools:
      - Medical literature chat: /chat/
      - Graph visualization: /graph-viz/
      - GraphQL GUI: /graphiql/
  - BFS-QL Protocol: BFS-Query-Language.md
  - Formal Definitions: formal-defns.md
  - Horn Clauses & Datalog: horn-clauses-datalog.md
  - NER Pipeline: NER-pipeline.md
  - Cookbook: Cookbook.md
  - Book Outline (Draft): Book-outline-20260702.md

